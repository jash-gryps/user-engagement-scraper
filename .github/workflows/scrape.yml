name: Scrape User Engagement

on:
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Checkout data repo
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          git clone https://jash-gryps:${GH_PAT}@github.com/jash-gryps/user-engagement-data.git data

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Run scraper
        env:
          GRYPS_EMAIL: ${{ secrets.GRYPS_EMAIL }}
          GRYPS_PASSWORD: ${{ secrets.GRYPS_PASSWORD }}
          GRYPS_BASE_URL: ${{ secrets.GRYPS_BASE_URL }}
          GRYPS_API_BASE: ${{ secrets.GRYPS_API_BASE }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
          GH_PAT: ${{ secrets.GH_PAT }}

        run: python scraper.py

      - name: Push data to private repo
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          cd data
          git config user.name "gryps-bot"
          git config user.email "bot@gryps.io"
          git add .
          if ! git diff --staged --quiet; then
            git commit -m "data: $(date -u '+%Y-%m-%d %H:%M') UTC"
            git pull --rebase origin main
            git push
          fi
